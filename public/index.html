<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="./icone.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0a0e17" />
    <meta
      name="description"
      content="Portfolio de Samy Boudjema, Apprenti Ingénieur DevSecOps et Développeur Full Stack spécialisé en Cybersécurité, React.js, et automatisation CI/CD."
    />
    <link rel="apple-touch-icon" href="./image_128.png" />
    <link rel="manifest" href="./manifest.json" />
    
    <!-- Font Awesome pour les icônes -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <!-- Balises Open Graph pour le partage sur les réseaux sociaux -->
    <meta property="og:title" content="Samy Boudjema | Portfolio" />
    <meta property="og:description" content="Portfolio de Samy Boudjema, Apprenti Ingénieur DevSecOps et Développeur Full Stack spécialisé en Cybersécurité, React.js, et automatisation CI/CD." />
    <meta property="og:image" content="https://samyboudjema.fr/image_512.png" />
    <meta property="og:url" content="https://samyboudjema.fr" />
    <meta property="og:type" content="website" />
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Samy Boudjema | Portfolio">
    <meta name="twitter:description" content="Portfolio de Samy Boudjema, Apprenti Ingénieur DevSecOps et Développeur Full Stack spécialisé en Cybersécurité, React.js, et automatisation CI/CD.">
    <meta name="twitter:image" content="https://samyboudjema.fr/image_512.png">
    
    <title>Samy Boudjema | Portfolio</title>

    <!-- SEO : URL canonique -->
    <link rel="canonical" href="https://samyboudjema.fr/" />

    <!-- Sécurité : Content Security Policy -->
    <!-- Empêche les injections XSS, le clickjacking et les ressources non autorisées -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self';
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com;
      font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com data:;
      img-src 'self' data: https:;
      connect-src 'self' https://api.emailjs.com;
      frame-ancestors 'none';
      form-action 'self';
      base-uri 'self';
    " />

    <!-- Sécurité : Anti-clickjacking et sniffing -->
    <meta http-equiv="X-Frame-Options" content="DENY" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!-- SEO : JSON-LD Données structurées -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Samy Boudjema",
      "url": "https://samyboudjema.fr",
      "jobTitle": "Apprenti Ingénieur DevSecOps",
      "sameAs": [
        "https://www.linkedin.com/in/samy-boudjema-814076218/",
        "https://github.com/SamyBoudjema",
        "https://gitlab.com/samy.bdm16"
      ]
    }
    </script>
  </head>
  <body>
    <noscript>Vous devez activer JavaScript pour exécuter cette application.</noscript>
    <div id="root"></div>
  </body>
</html>
